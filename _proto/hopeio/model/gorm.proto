syntax = "proto3";
package model;

import "patch/go.proto";

option go_package = "github.com/hopeio/protobuf/model";
option java_multiple_files = true;
option java_package = "xyz.hoper.protobuf.model";

message DeletedAt {
  int64 mills = 1;
}

// [(go.field) = {tags:'json:",inline" gorm:"embedded"', embed:true}]
message ModelTime{
  int64 createdAt = 1 [(go.field) = {tags:'gorm:"serializer:unix_milli_time;type:timestamptz(6);default:now();index"'}];
  int64 updatedAt = 2 [(go.field) = {tags:'gorm:"serializer:unix_milli_time;type:timestamptz(6)"'}];
  DeletedAt deletedAt = 3 [(go.field) = {tags:'gorm:"<-:false;type:timestamptz(6);index"'}];
}


// [(go.field) = {tags:'json:",inline" gorm:"embedded"'}]
message Model{
  uint64 id = 1 [(go.field) = {tags:'gorm:"primaryKey"'}];
  int64 createdAt = 2 [(go.field) = {tags:'gorm:"serializer:unix_milli_time;type:timestamptz(6);default:now()"'}];
  int64 updatedAt = 3 [(go.field) = {tags:'gorm:"serializer:unix_milli_time;type:timestamptz(6)"'}];
  DeletedAt deletedAt = 4 [(go.field) = {tags:'gorm:"<-:false;type:timestamptz(6);index"'}];
}